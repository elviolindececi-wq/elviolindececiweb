<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Galería — El Violín de Ceci</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css" />
  <style>
    .album-hero{padding:72px 0 20px}
    .album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .album-grid img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:22px;border:1px solid rgba(240,210,162,.14);box-shadow:var(--shadow)}
    .album-copy{max-width:760px;margin-bottom:34px}
    @media (max-width: 900px){.album-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="brand" href="../../">
        <span class="brand-mark">🎻</span>
        <span><strong>El Violín de Ceci</strong><small>Galería</small></span>
      </a>
      <nav class="nav-menu" style="display:flex">
        <a href="../../">Inicio</a>
        <a href="../../booking/">Reservar</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section album-hero">
      <div class="container">
        <div class="album-copy">
          <p class="eyebrow">Galería de boda</p>
          <h1 class="album-title">Historia real</h1>
          <p class="lead">Un álbum editorial pensado para mostrar los momentos más sensibles de cada boda con una estética uniforme, limpia y lista para crecer con nuevas historias reales.</p>
        </div>
        <div class="album-grid">
          <img src="../../assets/fotos/ceremonia-boda-aire-libre.webp" alt="Ceremonia al aire libre">
          <img src="../../assets/fotos/entrada-novia-violin.webp" alt="Entrada de la novia">
          <img src="../../assets/fotos/duo-violin-piano-boda.webp" alt="Dúo de violín y piano">
          <img src="../../assets/fotos/detalle-ceremonia-musica.webp" alt="Detalle de la ceremonia">
          <img src="../../assets/fotos/votos-boda-musica-en-vivo.webp" alt="Momento de votos">
          <img src="../../assets/fotos/salida-novios-musica-violin.webp" alt="Salida de los novios">
        </div>
      </div>
    </section>
  </main>

  <script>
    const titles = {
      'carlos-leticia': 'Carlos & Leticia',
      'ana-jose': 'Ana & José',
      'maria-diego': 'María & Diego',
      'sofia-pablo': 'Sofía & Pablo',
      'valentina-nico': 'Valentina & Nico',
      'lucia-mateo': 'Lucía & Mateo'
    };
    const slug = location.pathname.split('/').filter(Boolean).slice(-1)[0];
    const title = titles[slug] || 'Ana & José';
    document.querySelector('.album-title').textContent = title;
    document.title = `${title} — El Violín de Ceci`;
  </script>
</body>
</html>
